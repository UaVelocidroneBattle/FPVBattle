name: VelociBot Docker

on:
  push:

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Prepare Docker tags
      id: docker_tags
      run: |
        branch_tag=$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | tr '/' '-' | tr -cs 'a-z0-9_.-' '-')

        if [ "${GITHUB_REF_NAME}" = "master" ]; then
          echo "tags=latest,${branch_tag}" >> "${GITHUB_OUTPUT}"
        else
          echo "tags=${branch_tag}" >> "${GITHUB_OUTPUT}"
        fi

    - name: Build and publish to Registry
      uses: elgohr/Publish-Docker-Github-Action@v4
      with:
        name: g0rsky1983/velocibot
        registry: docker.io
        workdir: backend
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        dockerfile: Veloci.Web/Dockerfile
        tags: ${{ steps.docker_tags.outputs.tags }}
